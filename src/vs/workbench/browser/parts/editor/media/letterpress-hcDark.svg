<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="260" height="260" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Orbit Logo - High Contrast Dark -->
  <g opacity="0.3" transform="translate(130, 130)">
    <!-- Main circle -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="white" stroke-width="3"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="20" fill="white"/>
    
    <!-- Small orbital dot -->
    <circle cx="0" cy="-50" r="8" fill="white"/>
    
    <!-- Connection line from center to orbital dot -->
    <line x1="0" y1="-20" x2="0" y2="-42" stroke="white" stroke-width="2"/>
  </g>
</svg>
