<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Orbit Logo for Titlebar -->
  <!-- Hexagonal background -->
  <path d="M 100,10 L 173.2,55 L 173.2,145 L 100,190 L 26.8,145 L 26.8,55 Z" 
        fill="#e8e8e8" stroke="none"/>
  
  <!-- Main orbit circle -->
  <circle cx="100" cy="100" r="40" fill="none" stroke="#000000" stroke-width="3"/>
  
  <!-- Center dot -->
  <circle cx="100" cy="100" r="16" fill="#000000"/>
  
  <!-- Small orbital dot at top -->
  <circle cx="100" cy="60" r="6" fill="#000000"/>
  
  <!-- Connection line from center to orbital dot -->
  <line x1="100" y1="84" x2="100" y2="66" stroke="#000000" stroke-width="2"/>
</svg>
