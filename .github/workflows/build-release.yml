name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0, v0.2.0, etc.
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-14
    timeout-minutes: 180
    strategy:
      max-parallel: 1
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.2'

      - name: Select Xcode 15.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Install dependencies
        run: NODE_OPTIONS="--max-old-space-size=6144" npm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React components
        run: NODE_OPTIONS="--max-old-space-size=6144" npm run buildreact

      - name: Build macOS ${{ matrix.arch }}
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run gulp -- vscode-darwin-${{ matrix.arch }}-min

      - name: Codesign app
        run: ./scripts/codesign-macos.sh "../Orbit-darwin-${{ matrix.arch }}/Orbit.app"
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          VERSION=$(node -p "require('./product.json').orbitVersion")
          APP_DIR="../Orbit-darwin-${{ matrix.arch }}"
          if [ ! -d "$APP_DIR" ]; then
            echo "Expected app bundle at $APP_DIR"
            ls -la ..
            exit 1
          fi
          ./scripts/make-dmg.sh "$APP_DIR" "Orbit-${VERSION}-darwin-${{ matrix.arch }}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-darwin-${{ matrix.arch }}
          path: Orbit-*.dmg

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.2'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential g++ libx11-dev libxkbfile-dev \
            libsecret-1-dev libkrb5-dev python-is-python3 \
            libfuse2 libglib2.0-0 libgtk-3-0 libx11-xcb1 \
            libxss1 libxtst6 libnss3 libasound2 libdrm2 libgbm1

      - name: Install dependencies
        run: npm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React components
        run: npm run buildreact

      - name: Build Linux x64
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run gulp -- vscode-linux-x64-min

      - name: Create AppImage
        run: |
          cd scripts/appimage
          chmod +x create_appimage.sh
          ./create_appimage.sh
          VERSION=$(node -p "require('../../product.json').orbitVersion")
          mv Orbit-x86_64.AppImage "../../Orbit-${VERSION}-linux-x64.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-linux-x64
          path: Orbit-*.AppImage

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.2'

      - name: Install dependencies
        run: npm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React components
        run: npm run buildreact

      - name: Build Windows x64
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run gulp -- vscode-win32-x64-min

      - name: Create installer
        run: npm run gulp -- vscode-win32-x64-system-setup

      - name: Rename installer
        shell: pwsh
        run: |
          $version = (Get-Content product.json | ConvertFrom-Json).orbitVersion
          Move-Item ".build/win32-x64/system-setup/VSCodeSetup.exe" "Orbit-$version-win32-x64-setup.exe"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-win32-x64
          path: Orbit-*-win32-x64-setup.exe

  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -p "require('./product.json').orbitVersion")
          fi
          PRODUCT_VERSION=$(node -p "require('./product.json').orbitVersion")
          if [[ "$VERSION" != "$PRODUCT_VERSION" ]]; then
            echo "Tag version ($VERSION) does not match product.json orbitVersion ($PRODUCT_VERSION)"
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release Notes
        id: notes
        run: |
          cat > release_notes.md << 'EOF'
          # Orbit Editor v${{ steps.version.outputs.version }}
          
          Download the appropriate file for your operating system below.
          
          ## Installation
          
          ### macOS
          - **Intel Macs:** Download `Orbit-${{ steps.version.outputs.version }}-darwin-x64.dmg`
          - **Apple Silicon:** Download `Orbit-${{ steps.version.outputs.version }}-darwin-arm64.dmg`
          - Open the DMG and drag Orbit to Applications
          
          ### Windows
          - Download `Orbit-${{ steps.version.outputs.version }}-win32-x64-setup.exe`
          - Run the installer
          
          ### Linux
          - Download `Orbit-${{ steps.version.outputs.version }}-linux-x64.AppImage`
          - Make executable: `chmod +x Orbit-*.AppImage`
          - Run: `./Orbit-*.AppImage`
          
          ## Auto-update
          Orbit checks `update/latest.json` on GitHub for new versions. Install from the in-app notification when prompted.
          
          ---
          
          **Source code:** https://github.com/ashish200729/orbiteditor
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Orbit v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-manifest:
    name: Update auto-update manifest
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -p "require('./product.json').orbitVersion")
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Update latest.json with SHA-256 hashes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          ARGS=(--version "$VERSION" --tag "$TAG" --commit "${{ github.sha }}")
          DARWIN_ARM64=$(find artifacts -iname '*darwin-arm64*.dmg' | head -1 || true)
          DARWIN_X64=$(find artifacts -iname '*darwin-x64*.dmg' | head -1 || true)
          WIN32=$(find artifacts -iname '*win32*x64*setup*.exe' | head -1 || true)
          LINUX=$(find artifacts -iname '*linux*x64*.AppImage' | head -1 || true)
          [[ -n "$DARWIN_ARM64" ]] && ARGS+=(--asset "darwin-arm64=${DARWIN_ARM64}")
          [[ -n "$DARWIN_X64" ]] && ARGS+=(--asset "darwin-x64=${DARWIN_X64}")
          [[ -n "$WIN32" ]] && ARGS+=(--asset "win32-x64=${WIN32}")
          [[ -n "$LINUX" ]] && ARGS+=(--asset "linux-x64=${LINUX}")
          node scripts/update-latest-json.js "${ARGS[@]}"

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update/latest.json
          if git diff --staged --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "chore: update auto-update manifest for ${{ steps.version.outputs.tag }}"
            git push
          fi