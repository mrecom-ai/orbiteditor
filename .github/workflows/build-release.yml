name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0, v0.2.0, etc.
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-14
    timeout-minutes: 180
    strategy:
      max-parallel: 1
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.2'

      - name: Select Xcode 15.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Install dependencies
        run: NODE_OPTIONS="--max-old-space-size=6144" npm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React components
        run: NODE_OPTIONS="--max-old-space-size=6144" npm run buildreact

      - name: Build macOS ${{ matrix.arch }}
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run gulp -- vscode-darwin-${{ matrix.arch }}-min

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          VERSION=$(node -p "require('./product.json').orbitVersion")
          APP_DIR="../Orbit-darwin-${{ matrix.arch }}"
          if [ ! -d "$APP_DIR" ]; then
            echo "Expected app bundle at $APP_DIR"
            ls -la ..
            exit 1
          fi
          create-dmg \
            --volname "Orbit" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "Orbit-${VERSION}-darwin-${{ matrix.arch }}.dmg" \
            "$APP_DIR"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-darwin-${{ matrix.arch }}
          path: Orbit-*.dmg

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.2'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential g++ libx11-dev libxkbfile-dev \
            libsecret-1-dev libkrb5-dev python-is-python3 \
            libfuse2 libglib2.0-0 libgtk-3-0 libx11-xcb1 \
            libxss1 libxtst6 libnss3 libasound2 libdrm2 libgbm1

      - name: Install dependencies
        run: npm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React components
        run: npm run buildreact

      - name: Build Linux x64
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run gulp -- vscode-linux-x64-min

      - name: Create AppImage
        run: |
          cd scripts/appimage
          chmod +x create_appimage.sh
          ./create_appimage.sh
          VERSION=$(node -p "require('../../product.json').orbitVersion")
          mv Orbit-x86_64.AppImage "../../Orbit-${VERSION}-linux-x64.AppImage" || true

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-linux-x64
          path: Orbit-*.AppImage

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.2'

      - name: Install dependencies
        run: npm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React components
        run: npm run buildreact

      - name: Build Windows x64
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run gulp -- vscode-win32-x64-min

      - name: Create installer
        run: npm run gulp -- vscode-win32-x64-inno-updater

      - name: Rename installer
        shell: pwsh
        run: |
          $version = (Get-Content product.json | ConvertFrom-Json).orbitVersion
          if (Test-Path ".build/win32-x64/system-setup/*.exe") {
            Rename-Item ".build/win32-x64/system-setup/*.exe" "Orbit-$version-win32-x64-setup.exe"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-win32-x64
          path: .build/win32-x64/system-setup/Orbit-*.exe

  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Get version from product.json
        id: version
        run: |
          VERSION=$(node -p "require('./product.json').orbitVersion")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release Notes
        id: notes
        run: |
          cat > release_notes.md << 'EOF'
          # Orbit Editor v${{ steps.version.outputs.version }}
          
          Download the appropriate file for your operating system below.
          
          ## Installation
          
          ### macOS
          - **Intel Macs:** Download `Orbit-${{ steps.version.outputs.version }}-darwin-x64.dmg`
          - **Apple Silicon:** Download `Orbit-${{ steps.version.outputs.version }}-darwin-arm64.dmg`
          - Open the DMG and drag Orbit to Applications
          
          ### Windows
          - Download `Orbit-${{ steps.version.outputs.version }}-win32-x64-setup.exe`
          - Run the installer
          
          ### Linux
          - Download `Orbit-${{ steps.version.outputs.version }}-linux-x64.AppImage`
          - Make executable: `chmod +x Orbit-*.AppImage`
          - Run: `./Orbit-*.AppImage`
          
          ## What's New
          - Fresh launch v0.1.0
          - Orbit custom auto-updater via GitHub Releases
          - Local build + release workflow
          
          ---
          
          **Source code:** https://github.com/ashish200729/orbiteditor
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Orbit v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}