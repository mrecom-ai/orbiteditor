name: Build Windows

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.1.0)'
        required: true
        default: '0.1.0'
  push:
    tags:
      - 'windows-v*'

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.2'

      - name: Install dependencies
        run: npm install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build React components
        run: npm run buildreact

      - name: Build Windows x64
        run: NODE_OPTIONS="--max-old-space-size=8192" npm run gulp -- vscode-win32-x64-min

      - name: Create installer
        run: npm run gulp -- vscode-win32-x64-inno-updater

      - name: Rename installer
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version || '0.1.0' }}"
          if (Test-Path ".build/win32-x64/system-setup/*.exe") {
            Get-ChildItem ".build/win32-x64/system-setup/*.exe" | Rename-Item -NewName "Orbit-$version-win32-x64-setup.exe"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-win32-x64
          path: .build/win32-x64/system-setup/Orbit-*.exe
          retention-days: 7

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version || '0.1.0' }}
          files: .build/win32-x64/system-setup/Orbit-*.exe
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}